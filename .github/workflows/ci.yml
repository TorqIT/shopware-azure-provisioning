name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci__${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-azure-changes:
    name: Deploy changes to Azure test environment
    uses: ./.github/workflows/provision-azure-environment.yml
    with:
      SERVICE_PRINCIPAL_ID: ${{ vars.SERVICE_PRINCIPAL_ID }}
      ENVIRONMENT: test
      SKIP_IF_EXISTS: false
      PARAMETERS_FILE: ./.github/ci/parameters.json
      DOCKER_COMPOSE_FILE: ./.github/ci/docker-compose.yml
    secrets:
      SERVICE_PRINCIPAL_PASSWORD: ${{ secrets.SERVICE_PRINCIPAL_PASSWORD }}
      PIMCORE_ENCRYPTION_SECRET: ${{ secrets.PIMCORE_ENCRYPTION_SECRET }}
      PIMCORE_PRODUCT_KEY: ${{ secrets.PIMCORE_PRODUCT_KEY }}
      PIMCORE_INSTANCE_IDENTIFIER: ${{ secrets.PIMCORE_INSTANCE_IDENTIFIER }}

  deploy-skeleton-to-azure:
    name: Build and deploy Pimcore skeleton to Azure
    uses: TorqIT/pimcore-github-actions-workflows/.github/workflows/deploy-to-azure-container-apps.yml@v7
    needs: [deploy-azure-changes]
    with:
      ENVIRONMENT: test
      PROJECT_REPOSITORY: TorqIT/pimcore-skeleton
      PROJECT_REPOSITORY_REF: skeleton/recipes
      GITHUB_APP_CHECKOUT: true
      FEATURE_FLAG_INSTALL_MISSING_BUNDLES: true
    secrets:
      SERVICE_PRINCIPAL_ID: ${{ secrets.SERVICE_PRINCIPAL_ID }}
      SERVICE_PRINCIPAL_PASSWORD: ${{ secrets.SERVICE_PRINCIPAL_PASSWORD }}
      PIMCORE_ENCRYPTION_SECRET: ${{ secrets.PIMCORE_ENCRYPTION_SECRET }}
      PIMCORE_PRODUCT_KEY: ${{ secrets.PIMCORE_PRODUCT_KEY }}
      PIMCORE_INSTANCE_IDENTIFIER: ${{ secrets.PIMCORE_INSTANCE_IDENTIFIER }}
      GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}

  post-container-app-url:
    name: Post Container App URL to PR
    runs-on: ubuntu-latest
    needs: [deploy-skeleton-to-azure]
    steps:
      - uses: actions/checkout@v6

      - name: Build and start container, and log in to Azure
        uses: ./.github/actions/build-start-and-login
        with:
          SERVICE_PRINCIPAL_ID: ${{ vars.SERVICE_PRINCIPAL_ID }}
          SERVICE_PRINCIPAL_PASSWORD: ${{ secrets.SERVICE_PRINCIPAL_PASSWORD }}

      - name: Get container app URL
        id: get-url
        run: |
          URL=$(docker compose --file .github/ci/docker-compose.yml exec azure bash -c '
            az containerapp show \
              --name $(jq -r ".parameters.phpContainerAppName.value" parameters.json) \
              --resource-group $(jq -r ".parameters.resourceGroupName.value" parameters.json) \
              --query properties.configuration.ingress.fqdn -o tsv
          ')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Preview available at

      - name: Add or update PR comment with preview URL
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body: |
            Preview available at: [https://${{ steps.get-url.outputs.url }}](https://${{ steps.get-url.outputs.url }})
          edit-mode: replace
