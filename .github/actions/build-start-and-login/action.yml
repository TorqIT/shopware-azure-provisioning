name: ''
description: ''
inputs:
  DOCKER_COMPOSE_FILE:
    required: false
    description: ""
    default: "./.github/ci/docker-compose.yml"
  PARAMETERS_FILE:
    required: false
    description: ""
    default: "./.github/ci/parameters.json"
  SERVICE_PRINCIPAL_ID:
    required: true
    description: ""
  SERVICE_PRINCIPAL_PASSWORD:
    required: true
    description: ""
  AZURE_DOCKER_COMPOSE_SERVICE:
    required: false
    description: "Name of the service in the Docker Compose file that is used for running Azure CLI commands"
    default: azure

runs:
  using: "composite"
  steps:
    - name: Build and start container
      shell: bash
      run: |
        touch .env
        docker compose \
          --file ${{ inputs.DOCKER_COMPOSE_FILE }} \
          up -d --force-recreate \
          ${{ inputs.AZURE_DOCKER_COMPOSE_SERVICE }}

    - name: Log in to Azure via service principal
      shell: bash
      run: |
        touch .env
        TENANT=$(jq -r '.parameters.tenantId.value' ${{ inputs.PARAMETERS_FILE }}) >> .env
        SERVICE_PRINCIPAL_ID=${{ inputs.SERVICE_PRINCIPAL_ID }} >> .env
        SERVICE_PRINCIPAL_PASSWORD=${{ inputs.SERVICE_PRINCIPAL_PASSWORD }} >> .env
        docker compose \
          --file ${{ inputs.DOCKER_COMPOSE_FILE }} \
          --env-file .env \
          exec azure \
            az login --tenant $TENANT \
              --service-principal \
                --username $SERVICE_PRINCIPAL_ID \
                --password $SERVICE_PRINCIPAL_PASSWORD